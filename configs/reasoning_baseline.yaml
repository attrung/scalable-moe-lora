# Baseline LoRA on LLaMA 3.2 1B — reasoning + NLG (eff batch 36)
# Standard LoRA r=8 on q,v. Gradient checkpointing ON. b=12 acc=3 eff 36.
#
# STRESS NOTE: previously stress-tested at b=18 acc=2 (86.6% peak, OVER the
# 75% cap), then dropped pre-emptively to b=12 acc=3 (58.7% peak, comfortably
# safe) before Phase B submission to avoid an OOM-on-backward gamble across a
# 14h training run.
name: llama_reasoning_baseline
model_name: meta-llama/Llama-3.2-1B
lora_type: standard
target_modules: qv
rank: 8
alpha: 32
lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
