# Granularity sweep: r=1, K=64, top_k=16. Most fine-grained point on the
# K*r=64 / top_k*r=16 sweep. Uses the unified RoutedLoRA shared-bottleneck
# implementation with the low-rank router (router_dim=16).
#
# Matrix params per injection: 2 * d * K*r = 2 * d * 64 (constant across
# the granularity sweep). Total ~9.4M trainable params on LLaMA 3.2 1B.
# Memory profile is constant in K*r — this avoids the (batch, seq, K, d)
# stack tensor that the loop MoE implementation pays at high K.
name: llama_granularity_r1_k64
model_name: meta-llama/Llama-3.2-1B
lora_type: routed
target_modules: qv
rank: 1
alpha: 32
num_experts: 64
top_k: 16
router_type: lowrank
router_dim: 16
lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
