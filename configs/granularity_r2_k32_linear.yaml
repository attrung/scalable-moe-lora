# Granularity sweep: r=2, K=32, top_k=8 — LINEAR router variant.
# Pair with granularity_r2_k32.yaml (low-rank router rdim=16) for the
# router comparison axis in Phase B.
# Matrix params identical to the lowrank variant at K*r=64.
name: llama_granularity_r2_k32_linear
model_name: meta-llama/Llama-3.2-1B
lora_type: routed
target_modules: qv
rank: 2
alpha: 32
num_experts: 32
top_k: 8
router_type: linear
lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
