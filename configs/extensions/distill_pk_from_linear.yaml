# Extension — product-key student distilled from a frozen K=64 linear-router
# teacher. KL(student_softmax || teacher_softmax) over the K-wide router score
# distribution at each of the 32 MoELoRA modules; coefficient on the KL
# term is set on the CLI (--distill_coef, default 1.0 in scripts/distill.sh).
#
# Tests whether linear's OOD edge transfers into the cheap product-key router
# when the student is trained to match the teacher's *learned* gate shape
# directly. If yes: the OOD gap is a representational-fidelity issue solvable
# by transfer (33K params student + frozen teacher). If no: the gap is more
# fundamental than gate-shape mimicry.
name: ext_distill_pk_from_linear
model_name: meta-llama/Llama-3.2-1B

lora_type: moe
target_modules: qv
rank: 1
alpha: 32
num_experts: 64
top_k: 16
router_type: product_key
aux_loss_coef: 0.01

lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
