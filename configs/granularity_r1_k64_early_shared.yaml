# Phase D: early-shared router at finest granularity. A single full linear
# router (Linear(d, K)) computes routing once from the FIRST RoutedLoRA
# layer's input; all subsequent RoutedLoRA modules in the model reuse the
# same top-k indices and weights. Tests whether per-layer routing decisions
# are necessary in the frozen-backbone PEFT setting (Omni-Router Transformer
# argues residual connections keep representations stable across layers).
# Router cost amortized across L=32 LoRA injection points.
name: llama_granularity_r1_k64_early_shared
model_name: meta-llama/Llama-3.2-1B
lora_type: routed
target_modules: qv
rank: 1
alpha: 32
num_experts: 64
top_k: 16
router_type: early_shared
lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
