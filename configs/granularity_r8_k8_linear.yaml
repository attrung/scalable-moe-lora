# Granularity sweep: r=8, K=8, top_k=2 — LINEAR router variant.
# Pair with granularity_r8_k8.yaml (low-rank router rdim=16) for the
# router comparison axis in Phase B.
# Matrix params identical to the lowrank variant at K*r=64. At low K the
# router gap between linear and low-rank shrinks — this is the point where
# the scalability story is weakest.
name: llama_granularity_r8_k8_linear
model_name: meta-llama/Llama-3.2-1B
lora_type: routed
target_modules: qv
rank: 8
alpha: 32
num_experts: 8
top_k: 2
router_type: linear
lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
