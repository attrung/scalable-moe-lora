# Part A — MoE-LoRA (fine). K=64 experts of rank r=1, top_k=16.
# Same active rank per token as standard r=16 LoRA (k*r = 16). This is the
# winner from Part B (granularity sweep) reused here so Part A's "MoE-LoRA"
# row shows both the coarse and fine ends of the granularity dimension.
# Identical YAML to configs/b_granularity/linear/r1_k64.yaml.
name: moe_lora_fine_k64_r1_k16
model_name: meta-llama/Llama-3.2-1B

lora_type: routed
target_modules: qv
rank: 1
alpha: 32
num_experts: 64
top_k: 16
router_type: linear
aux_loss_coef: 0.01

lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
