# Part A — MoE-LoRA (coarse). K=8 experts of rank r=8, top_k=2.
# Same active rank per token as standard r=16 LoRA (k*r = 16).
# Switch-Transformer load-balance penalty at coef=0.01 — mandatory at top_k=2
# (the cell diverges without it under the linear router).
name: moe_lora_coarse_k8_r8_k2
model_name: meta-llama/Llama-3.2-1B

lora_type: moe
target_modules: qv
rank: 8
alpha: 32
num_experts: 8
top_k: 2
router_type: linear
aux_loss_coef: 0.01

lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
