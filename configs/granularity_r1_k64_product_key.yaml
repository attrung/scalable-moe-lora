# Phase D: product-key router (Lample et al. 2019) at finest granularity.
# Two scorers (d -> √K each), expert (i,j) score = scorer1[i] + scorer2[j].
# Top-k over the K = √K * √K product space. Same √K cost as hierarchical
# but no group bottleneck — any expert is reachable. Tests whether the
# group constraint in hierarchical hurts vs purely-factored scoring.
name: llama_granularity_r1_k64_product_key
model_name: meta-llama/Llama-3.2-1B
lora_type: routed
target_modules: qv
rank: 1
alpha: 32
num_experts: 64
top_k: 16
router_type: product_key
lora_dropout: 0.1
label_smoothing: 0.1
lr: 0.0004
weight_decay: 0.01
warmup_steps: 500
epochs: 3
batch_size: 12
gradient_accumulation_steps: 3
max_seq_len: 1024
gradient_checkpointing: true
